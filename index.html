<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raghavendra H ❤️ Prema</title>

<style>
body{
    margin:0;
    font-family:Georgia;
    text-align:center;
    background:#f8f0df;
}

.hero{
    background:#5b0000;
    color:white;
    padding:100px 20px;
}

button{
    background:gold;
    border:none;
    padding:15px 35px;
    border-radius:40px;
    font-size:24px;
    cursor:pointer;
}

.section{
    padding:30px;
}

a{
    background:#5b0000;
    color:white;
    padding:12px 25px;
    border-radius:30px;
    text-decoration:none;
    display:inline-block;
    margin-top:15px;
}

#invite{
    display:none;
}
</style>

<script>
function openInvite(){
    document.getElementById("invite").style.display="block";
}
</script>

</head>

<body>

<div class="hero">
    <h1>Raghavendra H ❤️ Prema</h1>

    <h2>Wedding Invitation</h2>

    <button onclick="openInvite()">
        OPEN INVITATION
    </button>
</div>

<div id="invite">

    <div class="section">
        <h2>Our Journey</h2>

        <p>
        Together with our families,
        we invite you to celebrate our wedding.
        </p>
    </div>

    <div class="section">
        <h2>Venue</h2>

        <h3>
        Bhathi Anjaneya Swamy Temple
        </h3>

        <p>
        Harihara, Davanagere District
        </p>

        <a href="https://maps.app.goo.gl/xvPtPX42GPfQ39A88?g_st=ac" target="_blank">
            Open Google Maps
        </a>

    </div>

</div>

</body>
</html>
