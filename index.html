<!DOCTYPE html>
<html>
<head>
<title>Raghavendra H & Prema</title>
    
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  
    <style>
    body{
            margin:0;
            background:#f8f0df;
            text-align:center;
            font-family:Georgia;
        }

        .hero{
            background:#2d0000;
            color:white;
            padding:100px 20px;
        }

        .hero h1{
            font-size:50px;
            margin-bottom:10px;
        }

        button{
            background:gold;
            border:none;
            padding:15px 30px;
            font-size:30px;
            border-radius:40px;
            cursor:pointer;
        }

        .section{
            padding:40px 20px;
        }

        h2{
            color:#8b0000;
        }

        a{
            display:inline-block;
            margin-top:20px;
            background:#8b0000;
            color:white;
            padding:12px 20px;
            border-radius:10px;
            text-decoration:none;
        }
    </style>

    <script>
        function openInvite() {
            document.getElementById("invite").style.display = "block";
            document.querySelector(".hero").style.display = "none";
        }
    </script>

</head>

<body>

    <div class="hero">
        <h1>Raghavendra H ❤️ Prema</h1>
        <h3>Wedding Invitation</h3>

        <button onclick="openInvite()">
            OPEN INVITATION
        </button>
    </div>

    <div id="invite" style="display:none">

        <div class="section">
            <h2>Wedding Date</h2>
            <h1>12 July 2026</h1>
            <p>Sunday</p>
        </div>

        <div class="section">
            <h2>Our Journey</h2>

            <p>
                Together with our families,
                we invite you to celebrate our wedding.
            </p>
        </div>

        <div class="section">
            <h2>Venue</h2>

            <h3>
                Bhathi Anjaneya Swamy Temple
            </h3>

            <p>
                Harihara, Davanagere District
            </p>

            <a href="https://maps.app.goo.gl/xvPtPX42GPfQ39A88?g_st=ac">
                Open Google Maps
            </a>
        </div>

    </div>

</body>
</html>
